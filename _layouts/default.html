<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .price {
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <h1>{{ site.title }}</h1>

  {{ content }}

  <script>
    function order(code){
      window.open(
        "https://wa.me/36708856190?text=Hello KOSABE, I want to order product code " + code,
        "_blank"
      );
    }
  </script>

</body>
</html>
