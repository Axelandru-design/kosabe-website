---
layout: default
---

<div class="products">
  {% for product in site.products %}
  <div class="card">
    {% if product.images %}
      <img src="{{ product.images[0] | relative_url }}" alt="{{ product.title }}">
    {% endif %}

    <h3>{{ product.title }}</h3>
    <div>Brand: {{ product.brand }}</div>
    <div>Size: {{ product.size }}</div>

    <button onclick="order('{{ product.code }}')">Select Product</button>

    <div class="price">€ | $ | £ – DM for price</div>
  </div>
  {% endfor %}
</div>
