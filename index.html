---
layout: default
---

<div class="products">

{% for product in site.products %}
<div class="card {{ product.category | downcase }}">
  <div class="card-content">
    <div class="category">{{ product.category }}</div>
    <h3>{{ product.code }} | {{ product.title }}</h3>
    <div class="brand">Brand: {{ product.brand }}</div>
    <div class="size">Size: {{ product.size }}</div>
    <button>Select Product</button>
    <div class="price">€ | $ | £ — DM for price</div>
  </div>
</div>
{% endfor %}

</div>
