<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOSABE | Luxury Soft Glam Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Poppins',sans-serif;
background:#f3ede9;
color:#3a2e2e;
padding-bottom:80px;
}

header{
background:linear-gradient(135deg,#e7c7c7,#e6d5c9);
padding:100px 20px 60px;
text-align:center;
}

header h1{
font-family:'Playfair Display',serif;
font-size:42px;
letter-spacing:3px;
}

.section{
padding:60px 20px;
max-width:1000px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:40px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s ease;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card-content{
padding:25px;
text-align:center;
}

.brand{
font-size:12px;
color:#c6a75e;
margin:8px 0;
font-weight:600;
}

.size{
display:inline-block;
padding:6px 16px;
border:1px solid #c6a75e;
border-radius:20px;
font-size:14px;
margin:8px 0;
}

button{
margin-top:12px;
padding:8px 20px;
border-radius:30px;
border:1px solid #c6a75e;
background:white;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

button:hover{
background:#c6a75e;
color:white;
}

.price{
color:#c6a75e;
margin-top:12px;
font-weight:600;
}
</style>
</head>
<body>

<header>
<h1>KOSABE</h1>
<p>Luxury Soft Glam Feminine Fashion</p>
</header>

<section class="section">
<div class="grid">

<!-- PRODUCT 1 -->
<div class="card">
<img src="20250307_213805.jpg" alt="KSB-01 Heels">
<div class="card-content">
<h3>KSB-01 | Obsidian Éclipse Sculpted Platforms</h3>
<div class="brand">Brand: Kayina</div>
<div class="size">Size: 40/41</div>
<button onclick="order('KSB-01')">Select Product</button>
<div class="price">€ | $ | £ — DM for price</div>
</div>
</div>

<!-- PRODUCT 2 -->
<div class="card">
<img src="20250307_215307.jpg" alt="KSB-02 Sneakers">
<div class="card-content">
<h3>KSB-02 | Neon Velocity Luxe Runners</h3>
<div class="brand">Brand: PUMA</div>
<div class="size">Size: 35/36</div>
<button onclick="order('KSB-02')">Select Product</button>
<div class="price">€ | $ | £ — DM for price</div>
</div>
</div>

</div>
</section>

<script>
function order(code){
window.open(
"https://wa.me/36708856190?text=Hello KOSABE, I want to order product code " + code,
"_blank"
);
}
</script>

</body>
</html>
